<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />
    <title>MindLens 이메일 인증</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main data-state="neutral">
      <div class="brand">MindLens</div>
      <div class="mark" aria-hidden="true">✓</div>
      <h1>이메일 인증을 계속할까요?</h1>
      <p id="message">아래 버튼을 누르면 이메일 주소 인증이 완료됩니다.</p>
      <div class="actions">
        <a class="button" id="confirm-link" href="#" rel="noreferrer">이메일 인증 완료하기</a>
      </div>
      <p class="hint">보안을 위해 사용자가 직접 버튼을 눌렀을 때만 인증을 진행합니다.</p>
    </main>
    <script src="/assets/confirm-signup.js"></script>
  </body>
</html>
